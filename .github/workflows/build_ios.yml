name: Build iOS App

on:
  push:
    branches: [ deployment ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build iOS
        run: |
          cd mobile_app
          # We use --no-codesign because we are building in a CI environment without a certificate
          flutter build ios --no-codesign --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-build
          path: mobile_app/build/ios/iphoneos/Runner.app
