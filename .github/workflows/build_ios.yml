name: Build iOS App

on:
  push:
    branches: [ deployment ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build iOS (Simulator)
        run: |
          cd mobile_app
          # Building for simulator so it can run on Appetize.io / Simulator
          flutter build ios --simulator --debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: mobile_app/build/ios/iphonesimulator/Runner.app
