name: Build iOS App

on:
  push:
    branches: [ deployment ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Flutter dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build iOS (Simulator)
        run: |
          cd mobile_app
          # --no-codesign prevents duplicate resource bundle conflicts from Firebase pods on CI
          flutter build ios --simulator --debug --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: mobile_app/build/ios/iphonesimulator/Runner.app
