services:
  # Backend API
  - type: web
    name: todo-backend
    env: python
    plan: free
    buildCommand: uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # You will set this in the Render dashboard

  # Frontend Dashboard
  - type: web
    name: todo-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your Backend URL after it is deployed
