services:
  # Backend API
  - type: web
    name: todo-backend
    env: python
    plan: free
    buildCommand: uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_DATABASE_URL
        sync: false # You will set this to your Aiven PostgreSQL URL
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false # Generate a random string for this
      - key: GEMINI_API_KEY
        sync: false # Add your Gemini API Key here
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Dashboard
  - type: web
    name: todo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your Backend URL after it is deployed
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false # Set this to your Google Client ID
