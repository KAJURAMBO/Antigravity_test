name: mobile_app
description: "AI-Smart Todo: Conquer every task with confidence."
publish_to: "none"
version: 1.2.2+17

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5
  image_picker: ^1.2.1
  google_sign_in: ^6.2.1
  firebase_core: ^3.1.1
  firebase_analytics: ^11.1.1
  firebase_messaging: ^15.0.0
  flutter_markdown: ^0.7.2
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
